<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備設計 LP - 契約構造</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #fafafa; font-family: 'Noto Sans JP', 'Inter', sans-serif; }

    /* ========================================
       FLOW SECTION
    ======================================== */
    .flow-section {
      background: #fafafa;
      padding: 80px 120px 100px;
    }

    .flow-inner {
      display: flex;
      flex-direction: column;
      gap: 52px;
      align-items: center;
      max-width: 1200px;
      padding: 0 32px;
      margin: 0 auto;
    }

    /* --- 見出し --- */
    .flow-heading {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .flow-eyebrow {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: #000;
      text-align: center;
      letter-spacing: 1px;
      line-height: 28px;
    }

    .flow-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      font-size: 48px;
      color: #000;
      text-align: center;
      letter-spacing: 3.84px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .flow-desc {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #000;
      text-align: center;
      letter-spacing: 1.44px;
      line-height: 1;
    }

    /* --- ステップカード列 --- */
    .steps-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      width: 100%;
    }

    /* 各ステップ（バッジ＋カードのユニット） */
    .step-unit {
      position: relative;
      flex-shrink: 0;
      padding-top: 34px; /* バッジの高さ分の余白 */
    }

    /* バッジ（STEP + 番号）*/
    .step-badge {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fafafa; /* カードのボーダーを隠すマスク */
      padding: 0 12px;
      z-index: 2;
    }

    .badge-step {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14.5px;
      color: #0ab394;
      letter-spacing: 0.72px;
      line-height: 1.3;
    }

    .badge-num {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 38px;
      color: #0ab394;
      letter-spacing: -0.77px;
      line-height: 1;
    }

    /* カード本体 */
    .step-card {
      width: 272px;
      height: 293px;
      background: #fff;
      border: 3.73px solid #0ab394;
      border-radius: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 30px 30px;
      gap: 15px;
      position: relative;
    }

    /* アイコン */
    .step-icon {
      width: 80px;
      height: 80px;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
    }

    /* テキストエリア */
    .step-texts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
    }

    .step-label-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-bottom: 19px;
      min-height: 67px;
    }

    .step-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: #0ab394;
      text-align: center;
      letter-spacing: 0.64px;
      line-height: 1.6;
    }

    .step-desc-text {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #000;
      text-align: center;
      letter-spacing: 0.56px;
      line-height: 1.6;
    }

    /* --- CTAボタン --- */
    .cta-wrap {
      display: flex;
      justify-content: center;
    }

    .cta-button {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 448px;
      height: 72px;
      background: #fff;
      border: 1px solid #000;
      border-radius: 36px;
      text-decoration: none;
      cursor: pointer;
    }

    .cta-button:hover { background: #f5f5f5; }

    .cta-button span {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      font-size: 16px;
      color: #000;
      letter-spacing: 0.32px;
      line-height: 1.6;
      white-space: nowrap;
    }

    .cta-arrow {
      position: absolute;
      right: 23px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <section class="flow-section">
    <div class="flow-inner">

      <!-- 見出し -->
      <div class="flow-heading">
        <p class="flow-eyebrow">FLOW</p>
        <h2 class="flow-title">契約構造</h2>
        <p class="flow-desc">ご契約・進行管理はすべて当社が一括対応します。</p>
      </div>

      <!-- ステップカード4枚 -->
      <div class="steps-wrap">

        <!-- STEP 01 -->
        <div class="step-unit">
          <div class="step-badge">
            <span class="badge-step">STEP</span>
            <span class="badge-num">01</span>
          </div>
          <div class="step-card">
            <img class="step-icon"
              src="https://www.figma.com/api/mcp/asset/5b02378a-4c9c-4768-af72-71df20ff3835"
              alt="お問い合わせ">
            <div class="step-texts">
              <div class="step-label-wrap">
                <p class="step-label">メール・フォームから<br>お問い合わせ</p>
              </div>
              <p class="step-desc-text">ご質問・ご相談がありましたら<br>お気軽にご連絡ください。</p>
            </div>
          </div>
        </div>

        <!-- STEP 02 -->
        <div class="step-unit">
          <div class="step-badge">
            <span class="badge-step">STEP</span>
            <span class="badge-num">02</span>
          </div>
          <div class="step-card">
            <img class="step-icon"
              src="https://www.figma.com/api/mcp/asset/f944b9db-da09-4e56-88b7-8c8ab746c6a1"
              alt="ご契約">
            <div class="step-texts">
              <div class="step-label-wrap">
                <p class="step-label">ご契約・お申込み</p>
              </div>
              <p class="step-desc-text">契約内容をご確認いただき、<br>オンラインで手続きが完了。</p>
            </div>
          </div>
        </div>

        <!-- STEP 03 -->
        <div class="step-unit">
          <div class="step-badge">
            <span class="badge-step">STEP</span>
            <span class="badge-num">03</span>
          </div>
          <div class="step-card">
            <img class="step-icon"
              src="https://www.figma.com/api/mcp/asset/aa12223f-64c2-4641-b42c-52f3bba24afe"
              alt="人材供給">
            <div class="step-texts">
              <div class="step-label-wrap">
                <p class="step-label">当社が人材供給<br>進行管理</p>
              </div>
              <p class="step-desc-text">要件に応じて適切な人材を<br>アサインし、進行を管理。</p>
            </div>
          </div>
        </div>

        <!-- STEP 04 -->
        <div class="step-unit">
          <div class="step-badge">
            <span class="badge-step">STEP</span>
            <span class="badge-num">04</span>
          </div>
          <div class="step-card">
            <img class="step-icon"
              src="https://www.figma.com/api/mcp/asset/9ad20067-9d78-41be-bcc5-1c7dc03d099b"
              alt="作図">
            <div class="step-texts">
              <div class="step-label-wrap">
                <p class="step-label">担当オペレーターが作図</p>
              </div>
              <p class="step-desc-text">専門スタッフが図面を作成し、<br>品質チェックまで対応します。</p>
            </div>
          </div>
        </div>

      </div>

      <!-- CTAボタン -->
      <div class="cta-wrap">
        <a href="#" class="cta-button">
          <span>無料で相談する</span>
          <img class="cta-arrow"
            src="https://www.figma.com/api/mcp/asset/fbe93579-0530-415b-ab40-827484f808f0"
            alt="">
        </a>
      </div>

    </div>
  </section>
</body>
</html>
