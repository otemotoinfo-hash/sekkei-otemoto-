<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備設計 LP - 全国どこでも対応</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #fafafa; font-family: 'Noto Sans JP', 'Inter', sans-serif; }

    /* ========================================
       COVERAGE SECTION
    ======================================== */
    .coverage-section {
      background: #fafafa;
      padding: 80px 120px 100px;
    }

    .coverage-inner {
      display: flex;
      flex-direction: column;
      gap: 52px;
      align-items: center;
      max-width: 1200px;
      padding: 0 32px;
      margin: 0 auto;
    }

    /* --- 見出しブロック --- */
    .coverage-heading {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }

    .heading-titles {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .coverage-eyebrow {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: #000;
      text-align: center;
      letter-spacing: 1px;
      line-height: 28px;
    }

    .coverage-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      font-size: 48px;
      color: #000;
      text-align: center;
      letter-spacing: 3.84px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .coverage-desc {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #000;
      text-align: center;
      letter-spacing: 1.44px;
      line-height: 1;
    }

    /* --- 都道府県タグ列 --- */
    .prefecture-row {
      display: flex;
      gap: 4px;
      align-items: center;
      width: 100%;
    }

    .pref-tag {
      background: #fff;
      border: 1px solid #e9e9e9;
      height: 46px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 13px 25px;
    }

    .pref-tag span {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #000;
      letter-spacing: 0.7px;
      line-height: 20px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <section class="coverage-section">
    <div class="coverage-inner">

      <!-- 見出し -->
      <div class="coverage-heading">
        <div class="heading-titles">
          <p class="coverage-eyebrow">COVERAGE</p>
          <h2 class="coverage-title">全国どこでも対応</h2>
        </div>
        <p class="coverage-desc">オンライン打ち合わせにて全国の案件に対応しております。</p>
      </div>

      <!-- 都道府県タグ -->
      <div class="prefecture-row">
        <div class="pref-tag"><span>東京</span></div>
        <div class="pref-tag"><span>神奈川</span></div>
        <div class="pref-tag"><span>千葉</span></div>
        <div class="pref-tag"><span>埼玉</span></div>
        <div class="pref-tag"><span>愛知</span></div>
        <div class="pref-tag"><span>大阪</span></div>
        <div class="pref-tag"><span>京都</span></div>
        <div class="pref-tag"><span>兵庫</span></div>
        <div class="pref-tag"><span>福岡</span></div>
      </div>

    </div>
  </section>
</body>
</html>
