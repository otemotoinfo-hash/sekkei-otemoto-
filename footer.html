<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備設計 LP - フッター</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(200.95deg, rgb(96, 193, 182) 6.06%, rgb(43, 149, 137) 83.86%);
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
    }

    /* ========================================
       FOOTER
    ======================================== */
    .footer-section {
      background: linear-gradient(200.95deg, rgb(96, 193, 182) 6.06%, rgb(43, 149, 137) 83.86%);
      padding: 80px 0;
    }

    .footer-inner {
      display: flex;
      flex-direction: column;
      gap: 36px;
      align-items: flex-start;
      max-width: 1200px;
      padding: 0 32px;
      margin: 0 auto;
    }

    /* ========================================
       3カラム情報ブロック
    ======================================== */
    .footer-columns {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      width: 100%;
    }

    .footer-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* カラム1：サービス概要 */
    .col-service-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: #fff;
      letter-spacing: 0.9px;
      line-height: 28px;
      padding-bottom: 16px;
      white-space: nowrap;
    }

    .col-service-desc {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.7px;
      line-height: 22.75px;
      padding-bottom: 16px;
    }

    .col-bullets {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .col-bullet-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding-top: 8px;
    }

    .col-bullet-item:first-child { padding-top: 0; }

    .bullet-dot {
      display: block;
      width: 6px;
      height: 6px;
      background: #fff;
      flex-shrink: 0;
      margin-top: 7px;
    }

    .bullet-text {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: #fff;
      letter-spacing: 0.6px;
      line-height: 19.5px;
      white-space: nowrap;
    }

    /* カラム2・3：セクションヘッダー */
    .col-section-head {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.7px;
      line-height: 20px;
      padding-bottom: 16px;
    }

    /* カラム2：運営情報 */
    .col-company-name,
    .col-company-addr {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.7px;
      line-height: 22.75px;
      white-space: nowrap;
    }

    .col-company-addr { padding-top: 4px; }

    .col-line-link {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      text-decoration: none;
    }

    .col-line-link:hover { opacity: 0.8; }

    .line-link-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      transform: rotate(180deg) scaleX(-1);
      flex-shrink: 0;
    }

    .line-link-text {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.7px;
      line-height: 20px;
      white-space: nowrap;
    }

    /* カラム3：リンク */
    .col-links {
      display: flex;
      flex-direction: column;
    }

    .col-links a {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.7px;
      line-height: 20px;
      text-decoration: none;
      white-space: nowrap;
      padding-top: 12px;
    }

    .col-links a:first-child { padding-top: 0; }
    .col-links a:hover { opacity: 0.75; }

    /* ========================================
       パートナーブロック
    ======================================== */
    .footer-partner {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .partner-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: #fff;
      letter-spacing: 0.6px;
      line-height: 19.5px;
      white-space: nowrap;
    }

    .partner-card {
      position: relative;
      background: #fff;
      border: 1px solid #fff;
      width: 320px;
      height: 98px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 33px;
    }

    .partner-logo {
      width: 182px;
      height: 42px;
      object-fit: cover;
      display: block;
    }

    .partner-link-icon {
      position: absolute;
      bottom: 11px;
      right: 11px;
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    /* ========================================
       コピーライト
    ======================================== */
    .footer-copyright {
      width: 100%;
      border-top: 1px solid #fff;
      padding-top: 33px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copyright-text {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: #fff;
      letter-spacing: 0.6px;
      line-height: 16px;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <footer class="footer-section">
    <div class="footer-inner">

      <!-- 3カラム情報 -->
      <div class="footer-columns">

        <!-- Col 1: サービス概要 -->
        <div class="footer-col">
          <h3 class="col-service-title">電気設備設計パートナー</h3>
          <p class="col-service-desc">電気設備設計図作成・CAD外注代行<br>各種申請代行サービス</p>
          <div class="col-bullets">
            <div class="col-bullet-item">
              <span class="bullet-dot"></span>
              <span class="bullet-text">事業監修：日本人建築士 / 電気工事会社</span>
            </div>
            <div class="col-bullet-item">
              <span class="bullet-dot"></span>
              <span class="bullet-text">体制：専門オペレーター + 日本人品質管理</span>
            </div>
          </div>
        </div>

        <!-- Col 2: 運営 -->
        <div class="footer-col">
          <h4 class="col-section-head">運営</h4>
          <p class="col-company-name">OTEMOTO株式会社</p>
          <p class="col-company-addr">愛知県西尾市新村町郷東5番地</p>
          <a href="#" class="col-line-link">
            <img class="line-link-icon"
              src="https://www.figma.com/api/mcp/asset/163c73c9-c159-4f99-8173-e3878ee1104f"
              alt="LINE">
            <span class="line-link-text">LINEでお問い合わせ</span>
          </a>
        </div>

        <!-- Col 3: リンク -->
        <div class="footer-col">
          <h4 class="col-section-head">リンク</h4>
          <div class="col-links">
            <a href="#">よくある質問</a>
            <a href="#">会社概要</a>
            <a href="#">品質保証</a>
            <a href="#">実績紹介</a>
            <a href="#">プライバシーポリシー</a>
          </div>
        </div>

      </div>

      <!-- パートナー -->
      <div class="footer-partner">
        <p class="partner-label">業務提携 : CAD外注・設計図面作成のパートナー企業</p>
        <div class="partner-card">
          <img class="partner-logo"
            src="https://www.figma.com/api/mcp/asset/c277fef3-e251-44dd-92b7-421436be6f15"
            alt="Plus358">
          <img class="partner-link-icon"
            src="https://www.figma.com/api/mcp/asset/2f1313ea-6bb9-4fcc-b6dd-986d213d69b8"
            alt="">
        </div>
      </div>

      <!-- コピーライト -->
      <div class="footer-copyright">
        <p class="copyright-text">© 2026 OTEMOTO株式会社 All Rights Reserved.</p>
      </div>

    </div>
  </footer>
</body>
</html>
