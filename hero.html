<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備設計 LP - ヒーロー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 背景動画 */
    .bg-video-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(0, 0, 0, 0.35);
    }

    .margin-wrap {
      position: relative;
      z-index: 2;
    }

    .margin-wrap {
      padding: 0 120px;
    }

    .inner {
      padding-top: 242px;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 1152px;
    }

    /* バッジ */
    .badge-wrap {
      display: flex;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 8px 20px;
    }

    .badge-text {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      font-size: 25px;
      color: #000;
      letter-spacing: 2px;
      line-height: 1.4;
      white-space: nowrap;
    }

    /* ヒーロー見出し */
    .headline-stack {
      display: inline-grid;
      grid-template-columns: max-content;
      grid-template-rows: max-content;
      place-items: start;
      line-height: 0;
    }

    .headline-line {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px 14px;
    }

    .headline-line:first-child {
      margin-top: 0;
      background: linear-gradient(76.85deg, rgb(20, 143, 0) 0%, rgb(19, 181, 37) 36.035%, rgb(0, 183, 150) 65.55%);
    }

    .headline-line:last-child {
      margin-top: 104px;
      background: linear-gradient(70.59deg, rgb(20, 143, 0) 0%, rgb(19, 181, 37) 36.035%, rgb(0, 183, 150) 65.55%);
    }

    .headline-text {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      font-size: 64px;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }

    /* サブタイトル */
    .subtitle-wrap {
      padding-left: 12px;
      display: flex;
    }

    .subtitle {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      font-size: 30px;
      color: #fff;
      letter-spacing: 1.2px;
      white-space: nowrap;
      line-height: 1;
    }

    .subtitle .char-so {
      letter-spacing: -2.24px;
    }

    .subtitle .char-fu {
      letter-spacing: -3.68px;
    }
  </style>
</head>
<body>
  <!-- 背景動画 -->
  <div class="bg-video-wrap">
    <video id="bg-video" autoplay muted playsinline></video>
  </div>
  <div class="bg-overlay"></div>

  <div class="margin-wrap">
    <div class="inner">
      <div class="content">

        <!-- バッジ -->
        <div class="badge-wrap">
          <div class="badge">
            <span class="badge-text">今すぐ設備設計が必要な建設会社様へ</span>
          </div>
        </div>

        <!-- 見出し2行（グリッド重ね） -->
        <div class="headline-stack">
          <div class="headline-line">
            <p class="headline-text">コストを抑えて</p>
          </div>
          <div class="headline-line">
            <p class="headline-text">設計業務を一括サポート</p>
          </div>
        </div>

        <!-- サブタイトル -->
        <div class="subtitle-wrap">
          <p class="subtitle">
            Tfas対応｜Rebro対応｜主要5<span class="char-so">ソ</span><span class="char-fu">フ</span>トすべて対応
          </p>
        </div>

      </div>
    </div>
  </div>
  <script>
    const playlist = [
      'file:///Users/ootsujiayana/★WORK/O/OTEMOTO/設備設計-LP/素材/movi-1.mp4',
      'file:///Users/ootsujiayana/★WORK/O/OTEMOTO/設備設計-LP/素材/movi-2.mp4'
    ];
    let current = 0;
    const video = document.getElementById('bg-video');

    function loadVideo(index) {
      video.src = playlist[index];
      video.load();
      video.play();
    }

    video.addEventListener('ended', () => {
      current = (current + 1) % playlist.length;
      loadVideo(current);
    });

    loadVideo(0);
  </script>
</body>
</html>
